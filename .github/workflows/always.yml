name: "[C]ontinuous [I]ntegration"

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: percebus/github-actions-node/.github/actions/setup@main
      - uses: percebus/github-actions-npm/.github/actions/install@main

      - name: lint
        run: npm run lint

      - name: react build
        run: npx react-scripts build

      - uses: percebus/github-actions-common/.github/actions/artifact-upload@main
        name: build.zip
        with:
          name: build
          path: build

      - name: electron-forge package
        run: npx electron-forge package

  verify__matrix:
    # if: github.ref == 'refs/heads/main'
    needs: verify
    strategy:
      max-parallel: 6
      matrix:
        node: [23, 24]
        os:
          - ubuntu-latest
          #         - macOS-latest # FIXME
          - windows-latest
    runs-on: ${{ matrix.os }}
    name: Build @ node:${{ matrix.node }}@${{ matrix.os }}
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: percebus/github-actions-node/.github/actions/setup@main
        with:
          node-version: ${{ matrix.node }}

      - uses: percebus/github-actions-npm/.github/actions/install@main

      - name: react build
        run: npm run build

  electron: # FIXME? takes 8min+
    # if: github.ref == 'refs/heads/main'
    if: false
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main

      - uses: percebus/github-actions-node/.github/actions/setup@main
        # with:
        #   node-version: 16

      - uses: percebus/github-actions-npm/.github/actions/install@main

      - uses: percebus/github-actions-common/.github/actions/artifact-download@main
        name: build.zip
        with:
          name: build
          path: build

      - name: electron-forge make
        run: npx electron-forge make

      # FIXME
      # - uses: percebus/github-actions-common/.github/actions/artifact-upload@main
      #   name: out.zip
      #   with:
      #     name: out
      #     path: out

  codeQL:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript
            dist: true # TODO? false?

          - language: actions
            dist: false

    name: CodeQL analyze
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
        with:
          ssh-private-key: ${{ secrets.SSH_KEY_PRIVATE }}

      - uses: percebus/github-actions-common/.github/actions/artifact-download@main
        if: ${{ matrix.dist }}
        name: build.zip
        with:
          name: build
          path: build

      - uses: percebus/github-actions-compliance/.github/actions/codeql_init_and_analyze@main
        with:
          language: ${{ matrix.language }}
