name: "[C]ontinuous [I]ntegration"

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: percebus/github-actions-node/.github/actions/setup@main
      - uses: percebus/github-actions-npm/.github/actions/install@main

      - name: lint
        run: npm run lint

      - name: react build
        run: npx react-scripts build

      - uses: percebus/github-actions-common/.github/actions/artifact-upload@main
        name: build.zip
        with:
          name: build
          path: build

      - name: electron-forge package
        run: npx electron-forge package


  build__matrix:
    if: github.ref == 'refs/heads/main'
    needs: build
    strategy:
      max-parallel: 6
      matrix:
        node: [22, 24]
        os:
          - ubuntu-latest
#         - macOS-latest # FIXME
          - windows-latest
    runs-on: ${{ matrix.os }}
    name: Build @ node:${{ matrix.node }}@${{ matrix.os }}
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main
      - uses: percebus/github-actions-node/.github/actions/setup@main
        with:
          node-version: ${{ matrix.node }}

      - uses: percebus/github-actions-npm/.github/actions/install@main

      - name: react build
        run: npm run build


  electron: # FIXME? takes 8min+
    # if: github.ref == 'refs/heads/main'
    if: false
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: percebus/github-actions-common/.github/actions/checkout@main

      - uses: percebus/github-actions-node/.github/actions/setup@main
        # with:
        #   node-version: 16

      - uses: percebus/github-actions-npm/.github/actions/install@main

      - uses: percebus/github-actions-common/.github/actions/artifact-download@main
        name: build.zip
        with:
          name: build
          path: build

      - name: electron-forge make
        run: npx electron-forge make
# FIXME
#     - name: out.zip
#       uses: actions/upload-artifact@v3
#       with:
#         name: out
#         path: out


  codeQL:
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    uses: percebus/github-actions-compliance/.github/workflows/codeql_analyze.yml@main
    name: CodeQL analyze
    with:
      language: ${{ matrix.language }}
